name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_linux:
        description: 'Build Linux'
        required: false
        default: 'false'
        type: boolean
      build_windows:
        description: 'Build Windows'
        required: false
        default: 'false'
        type: boolean
      build_macos:
        description: 'Build macOS'
        required: false
        default: 'false'
        type: boolean
      build_pypi:
        description: 'Build and upload PyPI package'
        required: false
        default: 'false'
        type: boolean
      build_appstore:
        description: 'Build and submit to Mac App Store'
        required: false
        default: 'false'
        type: boolean
      create_release:
        description: 'Create GitHub release (requires build_linux, build_windows, build_macos)'
        required: false
        default: 'false'
        type: boolean

jobs:

  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    if: github.event_name == 'push' || inputs.build_linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y python3-dev python3-tk libcairo2-dev

      - name: Build
        run: bash dev/build-linux.sh

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/gedcom-navigator-linux.zip

  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    if: github.event_name == 'push' || inputs.build_windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Install Azure Trusted Signing DLL
        run: nuget install Microsoft.ArtifactSigning.Client -x -OutputDirectory "$env:LOCALAPPDATA\Microsoft.ArtifactSigning.Client"

      - name: Build
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: pwsh dev/build.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/gedcom-navigator-windows-portable.zip
            dist/gedcom-navigator-windows-installer.exe

  # ── macOS Developer ID ─────────────────────────────────────────────────────
  build-macos:
    if: github.event_name == 'push' || inputs.build_macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up signing keychain
        env:
          APPLE_DEVELOPER_CERT_P12: ${{ secrets.APPLE_DEVELOPER_CERT_P12 }}
          APPLE_DEVELOPER_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_CERT_PASSWORD }}
        run: |
          [[ -z "$APPLE_DEVELOPER_CERT_P12" ]] && echo "ERROR: APPLE_DEVELOPER_CERT_P12 secret not set" && exit 1
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 20)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          printf '%s' "$APPLE_DEVELOPER_CERT_P12" | base64 -D -o /tmp/devid.p12
          [[ -f /tmp/devid.p12 ]] && [[ -s /tmp/devid.p12 ]] || { echo "ERROR: devid.p12 is empty or missing"; exit 1; }
          security import /tmp/devid.p12 -P "$APPLE_DEVELOPER_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm /tmp/devid.p12
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build
        env:
          APPLE_NOTARIZATION_APPLE_ID: ${{ secrets.APPLE_NOTARIZATION_APPLE_ID }}
          APPLE_NOTARIZATION_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          APPLE_NOTARIZATION_TEAM_ID: ${{ secrets.APPLE_NOTARIZATION_TEAM_ID }}
        run: bash dev/build-mac.sh

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/gedcom-navigator-mac.zip

  # ── macOS App Store ────────────────────────────────────────────────────────
  # Uses a pre-built patched Python from https://github.com/ajkessel/fix-tk-for-appstore
  # which has the forbidden App Store symbol (_NSWindowDidOrderOnScreenNotification) removed from Tk.
  build-macos-appstore:
    if: inputs.build_appstore
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate App Store secrets
        env:
          APPLE_DEVELOPER_CERT_P12: ${{ secrets.APPLE_DEVELOPER_CERT_P12 }}
          APPLE_APPSTORE_CERT_P12: ${{ secrets.APPLE_APPSTORE_CERT_P12 }}
          APPLE_APPSTORE_INSTALLER_CERT_P12: ${{ secrets.APPLE_APPSTORE_INSTALLER_CERT_P12 }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          [[ -z "$APPLE_DEVELOPER_CERT_P12" ]] && echo "ERROR: APPLE_DEVELOPER_CERT_P12 secret not set" && exit 1
          [[ -z "$APPLE_APPSTORE_CERT_P12" ]] && echo "ERROR: APPLE_APPSTORE_CERT_P12 secret not set" && exit 1
          [[ -z "$APPLE_APPSTORE_INSTALLER_CERT_P12" ]] && echo "ERROR: APPLE_APPSTORE_INSTALLER_CERT_P12 secret not set" && exit 1
          [[ -z "$APP_STORE_CONNECT_API_KEY" ]] && echo "ERROR: APP_STORE_CONNECT_API_KEY secret not set" && exit 1
          echo "All required App Store secrets are set"

      - name: Set up signing keychain
        env:
          APPLE_DEVELOPER_CERT_P12: ${{ secrets.APPLE_DEVELOPER_CERT_P12 }}
          APPLE_DEVELOPER_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_CERT_PASSWORD }}
          APPLE_APPSTORE_CERT_P12: ${{ secrets.APPLE_APPSTORE_CERT_P12 }}
          APPLE_APPSTORE_CERT_PASSWORD: ${{ secrets.APPLE_APPSTORE_CERT_PASSWORD }}
          APPLE_APPSTORE_INSTALLER_CERT_P12: ${{ secrets.APPLE_APPSTORE_INSTALLER_CERT_P12 }}
          APPLE_APPSTORE_INSTALLER_CERT_PASSWORD: ${{ secrets.APPLE_APPSTORE_INSTALLER_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/appstore-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 20)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          printf '%s' "$APPLE_DEVELOPER_CERT_P12" | base64 -D -o /tmp/devid.p12
          [[ -f /tmp/devid.p12 ]] && [[ -s /tmp/devid.p12 ]] || { echo "ERROR: devid.p12 is empty or missing"; exit 1; }
          echo "Developer ID cert: $(ls -lh /tmp/devid.p12 | awk '{print $5}')"
          file /tmp/devid.p12
          echo "Developer ID cert subject:"
          openssl pkcs12 -in /tmp/devid.p12 -password pass:"$APPLE_DEVELOPER_CERT_PASSWORD" -noout -nodes 2>&1 | grep "subject=" | head -1 || echo "(failed to extract)"
          security import /tmp/devid.p12 -P "$APPLE_DEVELOPER_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH" -T /usr/bin/codesign || { echo "FAILED to import Developer ID cert. Please verify the APPLE_DEVELOPER_CERT_P12 secret contains a valid base64-encoded .p12 file."; exit 1; }

          printf '%s' "$APPLE_APPSTORE_CERT_P12" | base64 -D -o /tmp/appstore_app.p12
          [[ -f /tmp/appstore_app.p12 ]] && [[ -s /tmp/appstore_app.p12 ]] || { echo "ERROR: appstore_app.p12 is empty or missing"; exit 1; }
          echo "App Store Application cert: $(ls -lh /tmp/appstore_app.p12 | awk '{print $5}')"
          file /tmp/appstore_app.p12
          echo "App Store Application cert subject:"
          openssl pkcs12 -in /tmp/appstore_app.p12 -password pass:"$APPLE_APPSTORE_CERT_PASSWORD" -noout -nodes 2>&1 | grep "subject=" | head -1 || echo "(failed to extract)"
          security import /tmp/appstore_app.p12 -P "$APPLE_APPSTORE_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH" -T /usr/bin/codesign || { echo "FAILED to import App Store cert. Please verify the APPLE_APPSTORE_CERT_P12 secret contains a valid base64-encoded .p12 file."; exit 1; }

          printf '%s' "$APPLE_APPSTORE_INSTALLER_CERT_P12" | base64 -D -o /tmp/appstore_installer.p12
          [[ -f /tmp/appstore_installer.p12 ]] && [[ -s /tmp/appstore_installer.p12 ]] || { echo "ERROR: appstore_installer.p12 is empty or missing"; exit 1; }
          echo "App Store Installer cert: $(ls -lh /tmp/appstore_installer.p12 | awk '{print $5}')"
          file /tmp/appstore_installer.p12
          echo "App Store Installer cert subject:"
          openssl pkcs12 -in /tmp/appstore_installer.p12 -password pass:"$APPLE_APPSTORE_INSTALLER_CERT_PASSWORD" -noout -nodes 2>&1 | grep "subject=" | head -1 || echo "(failed to extract)"
          security import /tmp/appstore_installer.p12 -P "$APPLE_APPSTORE_INSTALLER_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH" -T /usr/bin/codesign || { echo "FAILED to import Installer cert. Please verify the APPLE_APPSTORE_INSTALLER_CERT_P12 secret contains a valid base64-encoded .p12 file."; exit 1; }

          echo "Listing identities in keychain:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          echo "Listing identities again after partition list:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          rm /tmp/devid.p12 /tmp/appstore_app.p12 /tmp/appstore_installer.p12
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Set up provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo -n "${{ secrets.APPLE_APPSTORE_PROVISIONING_PROFILE }}" | base64 --decode \
            -o ~/Library/MobileDevice/Provisioning\ Profiles/gedcom-navigator.provisionprofile

      - name: Set up App Store Connect credentials
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" > ~/.appstoreconnect/apikey.txt
          printf '%s' "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" > ~/.appstoreconnect/apiissuer.txt
          printf '%s' "${{ secrets.APP_STORE_CONNECT_APP_ID }}" > ~/.appstoreconnect/appid.txt
          KEY_ID="${{ secrets.APP_STORE_CONNECT_KEY_ID }}"
          printf '%s' "${{ secrets.APP_STORE_CONNECT_API_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8

      - name: Download patched Python with fixed Tk
        run: |
          PYTHON_URL="https://github.com/ajkessel/fix-tk-for-appstore/releases/download/3.13.9/patched-python-3.13.9-macos-universal2.tar.gz"
          echo "Downloading patched Python from $PYTHON_URL"
          curl -L -o /tmp/patched-python.tar.gz "$PYTHON_URL"
          echo "Extracting to /"
          sudo tar xzf /tmp/patched-python.tar.gz -C /
          echo "Verifying Tk framework"
          TK_PATH="/Library/Frameworks/Python.framework/Versions/3.13.9/Frameworks/Tk.framework/Versions/Current/Tk"
          if nm -pa "$TK_PATH" 2>/dev/null | grep -iq _nswindowdidorder; then
            echo "ERROR: Tk still contains forbidden symbol after extraction"
            exit 1
          else
            echo "✓ Tk is clean (no forbidden symbols)"
          fi

      - name: Build Developer ID app (prerequisite for App Store build)
        env:
          APPLE_NOTARIZATION_APPLE_ID: ${{ secrets.APPLE_NOTARIZATION_APPLE_ID }}
          APPLE_NOTARIZATION_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          APPLE_NOTARIZATION_TEAM_ID: ${{ secrets.APPLE_NOTARIZATION_TEAM_ID }}
        run: bash dev/build-mac.sh

      - name: Build and submit to App Store
        run: bash dev/build-mac-appstore.sh

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH"

  # ── PyPI ───────────────────────────────────────────────────────────────────
  build-pypi:
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || inputs.build_pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: bash dev/build-pypi.sh

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || inputs.create_release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create release and upload artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" --generate-notes --draft

          gh release upload "$TAG" \
            release-artifacts/linux-build/gedcom-navigator-linux.zip \
            release-artifacts/macos-build/gedcom-navigator-mac.zip \
            release-artifacts/windows-build/gedcom-navigator-windows-portable.zip

          if [[ -f release-artifacts/windows-build/gedcom-navigator-windows-installer.exe ]]; then
            gh release upload "$TAG" release-artifacts/windows-build/gedcom-navigator-windows-installer.exe
          fi

          gh release edit "$TAG" --draft=false
